name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-build-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: insighta
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=3m

      - name: Run migrations
        env:
          PGPASSWORD: password
        run: psql -h localhost -U user -d insighta -f migrations/001.sql

      - name: Build
        run: go build -v ./...

      - name: Test
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/insighta?sslmode=disable
          JWT_SECRET: test-secret
          GITHUB_CLIENT_ID: test
          GITHUB_SECRET: test
          BASE_URL: http://localhost:8080
        run: go test -v -race -count=1 ./...
